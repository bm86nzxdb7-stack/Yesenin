        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4ede2;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #5c3a21;
            margin-bottom: 5px;
            text-align: center;
        }

        .subtitle {
            font-style: italic;
            margin-bottom: 25px;
            color: #555;
            text-align: center;
            max-width: 600px;
        }

        /* Палитра */
        .palette-container {
            text-align: center;
            margin-bottom: 25px;
            background: #fff;
            padding: 15px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }
        
        .palette-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 8px;
        }

        .palette {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .color-sample {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #ddd;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .color-sample:hover {
            transform: scale(1.15);
        }

        .color-sample.selected {
            border-color: #000;
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
            transform: scale(1.15);
        }

        /* Главный контейнер */
        .main-container {
            display: flex;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
        }

        /* Контейнер для иллюстрации */
        .illustration-container {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            flex: 1.8;
            max-width: 750px;
        }

        /* Интерактивные элементы SVG */
        .coloring-layer {
            cursor: pointer;
            fill: #ffffff;
            stroke: #222;
            stroke-width: 1.5;
            stroke-linejoin: round;
            stroke-linecap: round;
            transition: fill 0.3s ease;
        }
        
        .coloring-layer:hover {
            opacity: 0.85;
        }

        /* Статичные линии рисунка */
        .static-line {
            stroke: #222;
            stroke-width: 1.5;
            fill: none;
            pointer-events: none;
        }
        
        .static-fill {
            fill: #222;
            pointer-events: none;
        }

        /* Правая панель с цитатами */
        .quotes-container {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            flex: 1;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .quote-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .target-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px dashed #aaa;
            background-color: #fff;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .quote-input {
            flex-grow: 1;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .quote-input:focus {
            border-color: #5c3a21;
            box-shadow: 0 0 5px rgba(92, 58, 33, 0.2);

    </style>

    <script>
        let selectedColor = null;

        const paletteColors = document.querySelectorAll('.color-sample');
        const targetCircles = document.querySelectorAll('.target-circle');
        const coloringLayers = document.querySelectorAll('.coloring-layer');

        // Выбор цвета в палитре
        paletteColors.forEach(sample => {
            sample.addEventListener('click', () => {
                paletteColors.forEach(c => c.classList.remove('selected'));
                sample.classList.add('selected');
                selectedColor = sample.getAttribute('data-color');
            });
        });

        // Закрашивание контрольных кругов справа
        targetCircles.forEach(circle => {
            circle.addEventListener('click', () => {
                if (selectedColor) {
                    circle.style.backgroundColor = selectedColor;
                    circle.style.borderColor = selectedColor;
                    circle.style.borderStyle = 'solid';
                } else {
                    alert('Сначала выберите цвет в палитре!');
                }
            });
        });

        // Закрашивание элементов иллюстрации
        coloringLayers.forEach(layer => {
            layer.addEventListener('click', (e) => {
                if (selectedColor) {
                    // Если кликнули по группе (например, гроздь ягод), красим все кружочки внутри неё
                    if(layer.tagName === 'g') {
                        const circles = layer.querySelectorAll('circle');
                        circles.forEach(c => c.style.fill = selectedColor);
                    } else {
                        layer.style.fill = selectedColor;
                    }
                } else {
                    alert('Сначала выберите цвет в палитре!');
                }
            });
        });
    </script>
